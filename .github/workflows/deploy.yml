name: Deploy site to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: leaderboard/starlight/package-lock.json
      - run: pip install pyyaml
      - run: npm ci
        working-directory: leaderboard/starlight
      - name: Test site (no prefix)
        run: python3 leaderboard/test_site.py
      - name: Test site (with prefix)
        run: python3 leaderboard/test_site.py
        env:
          BASE_PATH: /llm-system-design
      - run: rm -rf leaderboard/starlight/src/content/docs
      - run: python leaderboard/build_site.py
      - run: npm run build
        working-directory: leaderboard/starlight
        env:
          BASE_PATH: /llm-system-design
      - uses: actions/upload-pages-artifact@v3
        with:
          path: leaderboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
